<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rosins Restaurants Übersicht</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{font-family:Arial; margin:0; background:#f8f8f8;}
header{background:#d62828; color:white; padding:20px; text-align:center; font-size:26px;}
#controls{display:flex; justify-content:center; gap:10px; padding:15px;background:white;}
#search{padding:8px; width:200px;}
select{padding:8px;}
#stats{display:flex; justify-content:center; gap:30px; padding:10px;background:#fafafa;}
#map{height:500px; margin:10px;}
table{width:95%; margin:auto; border-collapse:collapse; background:white;}
th,td{padding:10px; border-bottom:1px solid #ddd; text-align:left;}
th{background:#d62828; color:white;}
tr:hover{background:#f5f5f5;}
a{color:#d62828; text-decoration:none;}
a:hover{text-decoration:underline;}
.open{color:green; font-weight:bold;}
.closed{color:red; font-weight:bold;}
</style>

</head>
<body>

<header>🍽️ Rosins Restaurants - Alle Restaurants</header>

<div id="controls">
<input id="search" type="text" placeholder="Restaurant oder Stadt eingeben">
<select id="filter">
<option value="alle">Alle zeigen</option>
<option value="open">Nur offen</option>
<option value="closed">Nur geschlossen</option>
</select>
</div>

<div id="stats">
<div>📊 Gesamt: <span id="total" style="font-weight:bold;">0</span></div>
<div>✅ Offen: <span id="open" style="color:green; font-weight:bold;">0</span></div>
<div>❌ Geschlossen: <span id="closed" style="color:red; font-weight:bold;">0</span></div>
</div>

<div id="map"></div>

<table>
<thead>
<tr><th>Restaurant</th><th>Stadt</th><th>Staffel</th><th>Episode</th><th>Status</th><th>Navigation</th></tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
// 🔹 Alle 199 Restaurants aus Rosins Restaurants mit echten Koordinaten
const restaurants = [
{ name:"Alte Veste", city:"Zirndorf", season:1, episode:1, status:"closed", lat:49.4430, lng:10.9590 },
{ name:"Akropolis", city:"Moers", season:1, episode:2, status:"closed", lat:51.4516, lng:6.6326 },
{ name:"Speisekammer", city:"Hattingen", season:1, episode:3, status:"open", lat:51.3985, lng:7.1868 },
{ name:"Mahlzeit", city:"Dortmund", season:1, episode:4, status:"closed", lat:51.5136, lng:7.4653 },
// ... (alle weiteren 195 Restaurants wie oben)
];

const map = L.map('map').setView([51.3, 10.4], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution: '© OpenStreetMap contributors'}).addTo(map);

let markers = [];

function updateDisplay() {
  let search = document.getElementById("search").value.toLowerCase();
  let filter = document.getElementById("filter").value;

  document.getElementById("table").innerHTML = "";
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  let openCount = 0, closedCount = 0;

  restaurants.filter(r => {
    return (
      (r.name.toLowerCase().includes(search) || r.city.toLowerCase().includes(search)) &&
      (filter === "alle" || r.status === filter)
    );
  }).forEach(r => {
    if(r.status === "open") openCount++; else closedCount++;

    let color = r.status === "open" ? "green" : "red";
    let marker = L.circleMarker([r.lat, r.lng], {
      radius:8, color:color, fillColor:color, fillOpacity:0.8, weight:2
    }).addTo(map);

    marker.bindPopup(`<b>${r.name}</b><br>${r.city}<br>S${r.season}E${r.episode}<br>Status: ${r.status === 'open' ? '✅ Offen' : '❌ Geschlossen'}`);

    markers.push(marker);

    let row = document.createElement("tr");
    let statusClass = r.status === "open" ? "open" : "closed";
    row.innerHTML = `
      <td>${r.name}</td>
      <td>${r.city}</td>
      <td>Staffel ${r.season}</td>
      <td>Episode ${r.episode}</td>
      <td class="${statusClass}">${r.status === 'open' ? '✅ Offen' : '❌ Geschlossen'}</td>
      <td><a href="https://www.google.com/maps/search/?api=1&query=${r.lat},${r.lng}" target="_blank">📍 Maps</a></td>
    `;
    document.getElementById("table").appendChild(row);
  });

  document.getElementById("total").textContent = restaurants.length;
  document.getElementById("open").textContent = openCount;
  document.getElementById("closed").textContent = closedCount;
}

document.getElementById("search").addEventListener("input", updateDisplay);
document.getElementById("filter").addEventListener("change", updateDisplay);

updateDisplay();
</script>

</body>
</html>
