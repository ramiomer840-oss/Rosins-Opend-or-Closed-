<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Rosins Restaurants Karte</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#c62828;
color:white;
padding:20px;
text-align:center;
font-size:28px;
}

#controls{
display:flex;
gap:10px;
justify-content:center;
padding:15px;
background:white;
}

#search{
padding:8px;
width:220px;
}

select{
padding:8px;
}

#map{
height:500px;
margin:10px;
}

table{
width:95%;
margin:auto;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{
background:#eee;
}

</style>
</head>

<body>

<header>Rosins Restaurants Karte</header>

<div id="controls">

<input id="search" placeholder="Restaurant oder Stadt suchen">

<select id="filter">
<option value="alle">Alle</option>
<option value="offen">Offen</option>
<option value="geschlossen">Geschlossen</option>
</select>

</div>

<div id="map"></div>

<table>

<thead>
<tr>
<th>Restaurant</th>
<th>Stadt</th>
<th>Episode</th>
<th>Status</th>
<th>Navigation</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

<script>

const map = L.map('map').setView([51,10],6)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map)

let restaurants=[]
let markers=[]

function update(){

let search=document.getElementById("search").value.toLowerCase()
let filter=document.getElementById("filter").value

document.getElementById("table").innerHTML=""

markers.forEach(m=>map.removeLayer(m))
markers=[]

restaurants.filter(r=>{

return(

(r.name.toLowerCase().includes(search) ||
r.city.toLowerCase().includes(search)) &&

(filter==="alle" || r.status===filter)

)

}).forEach(r=>{

let color=r.status==="offen"?"green":"red"

let marker=L.circleMarker([r.lat,r.lng],{

radius:8,
color:color,
fillColor:color,
fillOpacity:0.8

}).addTo(map)

marker.bindPopup(

"<b>"+r.name+"</b><br>"+r.city+"<br>"+r.episode+"<br>Status: "+r.status

)

markers.push(marker)

let row=document.createElement("tr")

row.innerHTML=`
<td>${r.name}</td>
<td>${r.city}</td>
<td>${r.episode}</td>
<td>${r.status}</td>
<td><a target="_blank" href="https://www.google.com/maps/search/?api=1&query=${r.lat},${r.lng}">Navigation</a></td>
`

document.getElementById("table").appendChild(row)

})

}

fetch("restaurants.csv")

.then(response=>response.text())

.then(data=>{

const rows=data.split("\n").slice(1)

restaurants=rows.map(row=>{

const cols=row.split(",")

return{

name:cols[0],
city:cols[1],
episode:"S"+cols[2]+"E"+cols[3],
status:cols[4],
lat:parseFloat(cols[5]),
lng:parseFloat(cols[6])

}

})

update()

})

document.getElementById("search").addEventListener("input",update)

document.getElementById("filter").addEventListener("change",update)

</script>

</body>
</html>
