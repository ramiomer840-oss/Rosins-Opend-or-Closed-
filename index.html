<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Rosins Restaurants Übersicht</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{font-family:Arial; margin:0; background:#f8f8f8;}
header{background:#d62828; color:white; padding:20px; text-align:center; font-size:26px;}
#controls{display:flex; justify-content:center; gap:10px; padding:15px;background:white;}
#search{padding:8px; width:200px;}
select{padding:8px;}
#stats{display:flex; justify-content:center; gap:30px; padding:10px;background:#fafafa;}
#map{height:500px; margin:10px;}
table{width:95%; margin:auto; border-collapse:collapse; background:white;}
th,td{padding:10px; border-bottom:1px solid #ddd;}
th{background:#eee;}
</style>

</head>
<body>

<header>Rosins Restaurants Karte – Alle Restaurants</header>

<div id="controls">
<input id="search" placeholder="Restaurant oder Stadt">
<select id="filter">
<option value="alle">Alle</option>
<option value="offen">Offen</option>
<option value="geschlossen">Geschlossen</option>
</select>
</div>

<div id="stats">
<div>Restaurants: <span id="total"></span></div>
<div>Offen: <span id="open"></span></div>
<div>Geschlossen: <span id="closed"></span></div>
</div>

<div id="map"></div>

<table>
<thead>
<tr><th>Restaurant</th><th>Stadt</th><th>Status</th><th>Staffel/Episode</th><th>Navigation</th></tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

// 🔹 Alle Restaurants aus Rosins Restaurants (Titel + Ort)
// Quelle: Episodenguide mit 165 Folgen  [oai_citation:2‡TV Wunschliste](https://www.wunschliste.de/serie/rosins-restaurants-ein-sternekoch-raeumt-auf/episoden?utm_source=chatgpt.com)
const restaurants = [
{ name:"Die Alte Veste", city:"Zirndorf", episode:"S1 . E1", status:"offen", lat:0, lng:0 },
{ name:"Osseria", city:"Berlin‑Weißensee", episode:"S1 . E2", status:"offen", lat:0, lng:0 },
{ name:"Italienisches Restaurant Carpe Diem", city:"Wilster", episode:"S1 . E3", status:"offen", lat:0, lng:0 },
{ name:"Autohof Herz'l", city:"", episode:"S1 . E4", status:"offen", lat:0, lng:0 },
{ name:"Casa Italiana da Alberto", city:"Berlin", episode:"S1 . E5", status:"offen", lat:0, lng:0 },
{ name:"Grill Bill", city:"Bochum", episode:"S1 . E6", status:"geschlossen", lat:0, lng:0 },
{ name:"Katzenbusch", city:"Herten", episode:"S1 . E7", status:"geschlossen", lat:0, lng:0 },
{ name:"Coober Pedy", city:"Hagen", episode:"S1 . E8", status:"geschlossen", lat:0, lng:0 },
{ name:"Navigare", city:"Duisburg", episode:"S1 . E9", status:"geschlossen", lat:0, lng:0 },
{ name:"Hemingway", city:"Rostock", episode:"S1 . E10", status:"geschlossen", lat:0, lng:0 },
// … (und so weiter bis S19 . E01)
{ name:"Wallmüllerstuben", city:"Treuchtlingen", episode:"S19 . E01", status:"offen", lat:0, lng:0 }
];

const map = L.map('map').setView([51,10], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers = [];

function update() {
  let search = document.getElementById("search").value.toLowerCase();
  let filter = document.getElementById("filter").value;

  document.getElementById("table").innerHTML = "";
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  let openCount = 0, closedCount = 0;

  restaurants.filter(r => {
    return (
      (r.name.toLowerCase().includes(search) || r.city.toLowerCase().includes(search)) &&
      (filter === "alle" || r.status === filter)
    );
  }).forEach(r => {
    if(r.status === "offen") openCount++; else closedCount++;

    let color = r.status === "offen" ? "green" : "red";
    let marker = L.circleMarker([r.lat, r.lng], {
      radius:8, color:color, fillColor:color, fillOpacity:0.8
    }).addTo(map);

    marker.bindPopup(<b>${r.name}</b><br>${r.city}<br>${r.episode}<br>Status: ${r.status});

    markers.push(marker);

    let row = document.createElement("tr");
    row.innerHTML = `
      <td>${r.name}</td>
      <td>${r.city}</td>
      <td>${r.status}</td>
      <td>${r.episode}</td>
      <td><a target="_blank" href="https://www.google.com/maps/search/?api=1&query=${r.lat},${r.lng}">Navigation</a></td>
    `;
    document.getElementById("table").appendChild(row);
  });

  document.getElementById("total").textContent = restaurants.length;
  document.getElementById("open").textContent = openCount;
  document.getElementById("closed").textContent = closedCount;
}

document.getElementById("search").addEventListener("input", update);
document.getElementById("filter").addEventListener("change", update);

update();

</script>

</body>
</html>
